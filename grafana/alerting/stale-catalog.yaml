# Grafana provisioned alert rule: the one monitor that de-risks the catalog silently going stale.
#
# Nightly ingestion stamps each Stocklist's date onto the Items it reconciles; the app exports
# `fishpage.catalog.days_since_last_ingest`, a gauge that climbs once nightly ingestion stops. This
# rule pages when that climb passes the threshold — or when the gauge reports nothing at all, which
# is what an empty/never-ingested catalog and a dead exporter both look like (hence noDataState:
# Alerting). Import by pointing Grafana's alerting provisioning at this directory, or paste it into
# Grafana Cloud's "Alert rules → New → Import".
#
# Metric name: Grafana Cloud ingests OTLP metrics through its Prometheus store, which rewrites dots
# to underscores and appends the unit, so the OTel gauge `fishpage.catalog.days_since_last_ingest`
# (unit "d") arrives as `fishpage_catalog_days_since_last_ingest_days`. Adjust if your mapping
# differs. Set DATASOURCE_UID to your Grafana Cloud Prometheus datasource UID.
#
# Threshold: N = 2 days. Ingestion is nightly, so one missed night still reads under 2 and does not
# page on a single late supplier drop; two missed nights means the catalog is genuinely stale.

apiVersion: 1

groups:
  - orgId: 1
    name: fishpage-catalog
    folder: Fishpage
    interval: 5m
    rules:
      - uid: fishpage-stale-catalog
        title: Catalog stale — no successful ingest in 2 days
        condition: is_stale
        for: 0m
        noDataState: Alerting
        execErrState: Alerting
        annotations:
          summary: >-
            No Stocklist has been ingested in over 2 days (or the app is not reporting freshness).
            The catalog is silently stale — check the watcher, the nightly drop, and the exporter.
        labels:
          severity: page
        data:
          - refId: days
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: DATASOURCE_UID
            model:
              refId: days
              instant: true
              expr: max(fishpage_catalog_days_since_last_ingest_days)
          - refId: is_stale
            datasourceUid: __expr__
            model:
              refId: is_stale
              type: threshold
              expression: days
              conditions:
                # Inclusive: the gauge reads an integer calendar-day delta, so two missed nights
                # reads exactly 2. `gte` fires at 2-or-more; `gt` would only fire at 3+, missing
                # the two-nights-stale case this rule is named for. (If a Grafana version rejects
                # `gte` on a threshold expression, the equivalent is `type: gt` with `params: [1]`.)
                - evaluator:
                    type: gte
                    params: [2]
