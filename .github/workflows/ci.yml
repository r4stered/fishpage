name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Drop superseded runs: a new push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fail loudly if uv.lock is stale against pyproject.toml instead of silently
# re-resolving — every `uv run` below asserts the lockfile is up to date.
env:
  UV_LOCKED: "1"

jobs:
  # Docs-only changes don't need linting, typechecking, testing, or a deploy. But lint/types/test are
  # required status checks on main, and a job that never runs leaves its check pending forever, blocking
  # the merge. So those jobs always run and report success — they just skip their expensive steps when no
  # code changed, gated on this filter. `code` is every path except Markdown and docs/.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v7
        if: needs.changes.outputs.code == 'true'
        with:
          enable-cache: true
      - run: uv run just lint
        if: needs.changes.outputs.code == 'true'

  types:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v7
        if: needs.changes.outputs.code == 'true'
        with:
          enable-cache: true
      - run: uv run just typecheck
        if: needs.changes.outputs.code == 'true'

  test:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        if: needs.changes.outputs.code == 'true'
      - uses: astral-sh/setup-uv@v7
        if: needs.changes.outputs.code == 'true'
        with:
          enable-cache: true
      - run: uv run just test
        if: needs.changes.outputs.code == 'true'
      - name: Upload coverage reports to Codecov
        if: needs.changes.outputs.code == 'true'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Continuous deployment. The deploy and release jobs gate on lint/types/test, so a red main never
  # ships, and run only on a push to main, so pull requests exercise the gate without deploying.

  # Build the deploy image once, push it to GHCR (private — the image bakes in the sample Stocklist's
  # wholesale prices) tagged by git SHA and `main`, and to Fly's registry, then release that exact
  # SHA-tagged image to the Machine with no rebuild. The SHA tag is the rollback lever: redeploying a
  # prior SHA is a pull-and-restart, no build.
  deploy:
    needs: [changes, lint, types, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Authenticate Docker to the Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Build and push the image to GHCR and the Fly registry
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:main
            registry.fly.io/fishpage:${{ github.sha }}
      - name: Deploy the SHA-tagged image to Fly (no rebuild)
        run: flyctl deploy --app fishpage --image registry.fly.io/fishpage:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Attach the built wheel to a GitHub Release as a versioned audit trail — not the rollback lever,
  # which is the image above. The release is tagged with the package version plus the deployed git
  # SHA so the artifact ties back to the exact commit.
  release:
    needs: [changes, lint, types, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build the wheel
        run: uv build --wheel -o dist
      - name: Publish the wheel to a GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(grep -m1 '^version = ' pyproject.toml | cut -d'"' -f2)"
          tag="v${version}-${GITHUB_SHA:0:7}"
          gh release create "$tag" dist/*.whl \
            --title "$tag" \
            --notes "Wheel for fishpage ${version} at ${GITHUB_SHA}. Versioned audit trail only; rollback redeploys a prior image SHA (see the README)."
