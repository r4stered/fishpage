name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# Drop superseded runs: a new push to the same ref cancels the in-flight review.
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Docs-only PRs don't need a code review, but claude-review is a required status check on main — a job
  # that never runs leaves its check pending forever and blocks the merge. So the job always runs and
  # reports success; it just skips the review step when no code changed. `code` is every path except
  # Markdown and docs/.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'

  claude-review:
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        if: needs.changes.outputs.code == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review --comment ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

