<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fishpage — Catalog</title>
</head>
<body>
  <h1>Catalog</h1>
  <form class="filters" method="get" action="/">
    <label>
      Search
      <input type="search" name="search" value="{{ search }}" placeholder="name">
    </label>
    <label>
      <input type="checkbox" name="include_out_of_stock" value="true"
             onchange="this.form.submit()"{% if include_out_of_stock %} checked{% endif %}>
      Include out of stock
    </label>
    <label>
      Category
      <select name="category" onchange="this.form.submit()">
        <option value="">All categories</option>
        {% for category in categories %}
        <option value="{{ category }}"{% if category == selected_category %} selected{% endif %}>{{ category }}</option>
        {% endfor %}
      </select>
    </label>
  </form>
  <p>{{ items|length }} Items</p>
  <ul class="catalog-grid">
    {% for item in items %}
    <li class="card" data-sku="{{ item.sku }}">
      <img class="placeholder" src="/static/placeholder.svg" alt="placeholder image for {{ item.name }}">
      <h2 class="name">{{ item.name }}</h2>
      <span class="size">{{ item.size }}</span>
      <span class="retail-price">${{ item.retail_price }}</span>
      {% if item.special_price is not none %}
      <span class="special-price">special ${{ item.special_price }}</span>
      {% endif %}
      <span class="qty">{{ item.qty_avail }} available</span>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
