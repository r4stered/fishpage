<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fishpage — Catalog</title>
</head>
<body>
  <h1>Catalog</h1>
  <p>{{ items|length }} Items</p>
  <ul class="catalog-grid">
    {% for item in items %}
    <li class="card" data-sku="{{ item.sku }}">
      <img class="placeholder" src="/static/placeholder.svg" alt="placeholder image for {{ item.name }}">
      <h2 class="name">{{ item.name }}</h2>
      <span class="size">{{ item.size }}</span>
      <span class="retail-price">${{ item.retail_price }}</span>
      {% if item.special_price is not none %}
      <span class="special-price">special ${{ item.special_price }}</span>
      {% endif %}
      <span class="qty">{{ item.qty_avail }} available</span>
    </li>
    {% endfor %}
  </ul>
</body>
</html>
