# Fishpage runs as a single always-on Fly Machine.
#
# No public IP is allocated and no service ports are published, so there is no internet-reachable
# origin and the supplier's wholesale prices stay private. The only way in is `fly proxy` over Fly's
# private WireGuard network:
#
#     fly deploy                          # build and release the image to the Machine
#     fly ips list                        # expect no v4/v6 addresses allocated
#     fly proxy 8080:8080 -a fishpage     # then browse http://localhost:8080/

app = "fishpage"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Listen on IPv6. With no public service, the only path to the app is `fly proxy` over Fly's
  # private network, which is IPv6-only; a process bound to 0.0.0.0 (IPv4) would reset those
  # connections. "::" accepts IPv4-mapped clients too, so the local IPv4 path keeps working.
  HOST = "::"
  # Where Litestream replicates the write-ahead log. Its presence is what switches replication on,
  # so the catalog survives a redeploy. The R2 endpoint and credentials are set as Fly secrets,
  # never committed: LITESTREAM_R2_ENDPOINT, LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY.
  LITESTREAM_REPLICA_URL = "s3://fishpage-litestream/catalog"

# A single Machine that never auto-stops. There is deliberately no [http_service] or
# [[services]] block: those publish to a public IP, which is exactly what this slice must not do.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
