# Fishpage runs as a single always-on Fly Machine.
#
# No public IP is allocated and no service ports are published, so there is no internet-reachable
# origin and the supplier's wholesale prices stay private. Public access comes through a Cloudflare
# Tunnel: cloudflared (baked into the image) dials out to Cloudflare's edge, which enforces a login
# + allowlist, then forwards authenticated requests to the local app. The tunnel token is a Fly
# secret, CLOUDFLARE_TUNNEL_TOKEN, never committed. Administration still goes over Fly's private
# WireGuard network; the `ops` recipes in the justfile wrap the common commands:
#
#     just ips        # expect no v4/v6 addresses allocated — no public origin
#     just proxy      # private admin path: browse http://localhost:8080/
#     just logs       # tail the Machine's logs
#
# Releases ship on merge to main; the only manual deploy is `just rollback <sha>`.

app = "fishpage"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Listen on IPv6. With no public service, the app is reached only over `fly proxy` (Fly's private
  # network, which is IPv6-only) and the in-container Cloudflare Tunnel; a process bound to 0.0.0.0
  # (IPv4) would reset the `fly proxy` connections. This socket does not accept literal IPv4
  # loopback, so the tunnel forwards to the IPv6 loopback `http://[::1]:8080`, not localhost.
  HOST = "::"
  # Where Litestream replicates the write-ahead log. Its presence is what switches replication on,
  # so the catalog survives a redeploy. The R2 endpoint and credentials are set as Fly secrets,
  # never committed: LITESTREAM_R2_ENDPOINT, LITESTREAM_ACCESS_KEY_ID, LITESTREAM_SECRET_ACCESS_KEY.
  LITESTREAM_REPLICA_URL = "s3://fishpage-litestream/catalog"
  # Enrichment images: bytes live in a separate R2 bucket, proxied through the app so they stay
  # behind Access. The bucket name and the opt-in flag are non-secret config; the R2 endpoint and
  # credentials are Fly secrets, never committed: R2_IMAGES_ENDPOINT, R2_IMAGES_ACCESS_KEY_ID,
  # R2_IMAGES_SECRET_ACCESS_KEY. With the flag off (or no credentials) image upload/serve is dormant.
  FISHPAGE_IMAGES_ENABLED = "true"
  R2_IMAGES_BUCKET = "fishpage-images"
  # OTLP wire protocol for telemetry export. Non-secret config, so it lives here rather than in Fly
  # secrets. What actually switches export on is OTEL_EXPORTER_OTLP_ENDPOINT, set as a Fly secret
  # alongside the auth header OTEL_EXPORTER_OTLP_HEADERS (Authorization=Basic <base64>); with no
  # endpoint the exporter is a no-op and this value is inert.
  OTEL_EXPORTER_OTLP_PROTOCOL = "http/protobuf"
  # Enrichment: the background drainer calls Claude to fill in care classifiers. This opt-in flag is
  # non-secret config; the key it pairs with is a Fly secret, never committed: ANTHROPIC_API_KEY.
  # Both are needed — with the flag off, or no key, the enricher is never constructed and the drainer
  # no-ops, so the catalog still serves manually-entered values.
  ENRICHMENT_ENABLED = "true"

# A single Machine that never auto-stops. There is deliberately no [http_service] or
# [[services]] block: those publish to a public IP, which is exactly what this slice must not do.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# Machine-level health check. With no public service to attach a check to, this top-level block
# probes the app directly on its internal port, so Fly restarts a Machine whose app has wedged.
# It hits /healthz over the loopback the app listens on; a non-200 marks the Machine unhealthy.
[checks]
  [checks.healthz]
    type = "http"
    port = 8080
    method = "get"
    path = "/healthz"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
